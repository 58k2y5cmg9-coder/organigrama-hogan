<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Organigrama Hogan · Claro Colombia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#EEF1F8;color:#111827;min-height:100vh}

/* ── HEADER ── */
.hdr{background:#0033A0;height:60px;display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr-logo{width:36px;height:36px;background:#fff;border-radius:9px;display:grid;place-items:center;font-weight:800;color:#0033A0;font-size:1rem;flex-shrink:0}
.hdr h1{color:#fff;font-size:1rem;font-weight:700;letter-spacing:-.01em}
.hdr-sub{color:rgba(255,255,255,.55);font-size:.7rem;margin-top:1px}
.hdr-stats{margin-left:auto;display:flex;gap:20px}
.hs{text-align:right}.hs .n{color:#fff;font-size:1.2rem;font-weight:700;line-height:1}.hs .l{color:rgba(255,255,255,.5);font-size:.62rem;text-transform:uppercase;letter-spacing:.05em}

/* ── TABS ── */
.tabs{background:#fff;border-bottom:1px solid #E2E6EF;display:flex;padding:0 24px}
.tab{padding:12px 18px;font-size:.82rem;font-weight:600;color:#6B7280;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s}
.tab.on{color:#0033A0;border-bottom-color:#0033A0}
.tab span{font-weight:400;color:#9CA3AF;font-size:.75rem;margin-left:5px}

/* ── FILTERS ── */
.fbar{background:#fff;border-bottom:1px solid #E2E6EF;padding:10px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.srch{position:relative;flex:1;min-width:180px;max-width:320px}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:#9CA3AF}
.srch input{width:100%;padding:7px 9px 7px 28px;border:1px solid #D1D5DB;border-radius:8px;font-size:.8rem;outline:none;background:#F9FAFB}
.srch input:focus{border-color:#0033A0;background:#fff}
select.fsel{padding:7px 10px;border:1px solid #D1D5DB;border-radius:8px;font-size:.79rem;background:#F9FAFB;color:#374151;outline:none;cursor:pointer}
select.fsel:focus{border-color:#0033A0}
.rcount{margin-left:auto;font-size:.72rem;color:#9CA3AF}

/* ── GRID ── */
.wrap{padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}

/* ── JEFE CARD ── */
.jcard{background:#fff;border:1px solid #E2E6EF;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .17s,box-shadow .17s,border-color .17s}
.jcard:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,51,160,.13);border-color:#C7D2F5}
.jch{background:linear-gradient(135deg,#002080 0%,#0044CC 100%);padding:14px 16px;position:relative;overflow:hidden}
.jch::after{content:'';position:absolute;right:-15px;top:-15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.07)}
.jav{width:42px;height:42px;border-radius:11px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#fff;flex-shrink:0}
.jname{color:#fff;font-weight:700;font-size:.85rem;line-height:1.3}
.jcargo{color:rgba(255,255,255,.6);font-size:.69rem;margin-top:2px}
.jtbadge{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.18);color:#fff;padding:3px 9px;border-radius:20px;font-size:.75rem;font-weight:700}

.jcb{padding:14px 16px}
.jdir{font-size:.67rem;color:#9CA3AF;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}

/* ── RESUMEN EQUIPO (card) ── */
.eq-resumen{background:#F8FAFF;border:1px solid #E0E7FF;border-radius:10px;padding:10px 12px;margin-bottom:10px}
.eq-title{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6B7280;margin-bottom:7px}
.eq-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.eq-label{font-size:.7rem;color:#374151;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq-bar-bg{flex:1;height:5px;background:#E5E7EB;border-radius:10px;overflow:hidden}
.eq-bar-fill{height:100%;border-radius:10px}
.eq-val{font-size:.69rem;font-weight:700;width:24px;text-align:right}
.eq-insight{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ins{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:.65rem;font-weight:700}
.ins.best{background:#D1FAE5;color:#065F46}
.ins.weak{background:#FEE2E2;color:#991B1B}

/* dist bar */
.dbar-wrap{margin-bottom:10px}
.dlabel{font-size:.66rem;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.dbar{display:flex;height:7px;border-radius:10px;overflow:hidden;gap:2px}
.dseg{border-radius:4px;min-width:3px}
.dseg.ma{background:#0284C7}.dseg.al{background:#059669}.dseg.mo{background:#D97706}.dseg.ba{background:#DC2626}.dseg.mb{background:#7C3AED}.dseg.sd{background:#D1D5DB}
.dlegend{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.dleg-item{display:flex;align-items:center;gap:3px;font-size:.63rem;color:#6B7280}
.dleg-dot{width:7px;height:7px;border-radius:50%}

/* mini team */
.mteam{display:flex;flex-direction:column;gap:3px}
.mmb{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid #F3F4F6}
.mmb:last-child{border-bottom:none}
.mmbn{font-size:.75rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:175px}
.mmbcargo{font-size:.64rem;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cpill{padding:2px 7px;border-radius:20px;font-size:.62rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.cpill.ma{background:#E0F2FE;color:#0369A1}.cpill.al{background:#D1FAE5;color:#065F46}
.cpill.mo{background:#FEF3C7;color:#92400E}.cpill.ba{background:#FEE2E2;color:#991B1B}
.cpill.mb{background:#EDE9FE;color:#5B21B6}.cpill.sd{background:#F3F4F6;color:#6B7280}

.jcf{padding:10px 16px;border-top:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center}
.vermas{font-size:.73rem;color:#0033A0;font-weight:700}
.morebadge{font-size:.68rem;color:#9CA3AF}

/* ── MODAL ── */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;backdrop-filter:blur(4px);align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.moverlay.open{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:1040px;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:pop .2s cubic-bezier(.34,1.56,.64,1);margin:auto}
@keyframes pop{from{opacity:0;transform:scale(.93) translateY(16px)}to{opacity:1;transform:none}}

.mhdr{background:linear-gradient(135deg,#001A6E 0%,#0044BB 100%);padding:20px 24px;border-radius:20px 20px 0 0;position:relative;overflow:hidden}
.mhdr::before{content:'';position:absolute;right:-50px;top:-50px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05)}
.mav-lg{width:52px;height:52px;border-radius:13px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;color:#fff;flex-shrink:0}
.mname{color:#fff;font-size:1.2rem;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.mcargo{color:rgba(255,255,255,.65);font-size:.79rem;margin-top:2px}
.mmeta{color:rgba(255,255,255,.45);font-size:.69rem;margin-top:3px}
.mclose{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;font-size:1.1rem;display:grid;place-items:center}
.mclose:hover{background:rgba(255,255,255,.25)}
.mstats{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.mst{background:rgba(255,255,255,.12);padding:7px 13px;border-radius:9px}
.mst .n{color:#fff;font-size:1.2rem;font-weight:800;line-height:1}
.mst .l{color:rgba(255,255,255,.55);font-size:.62rem;text-transform:uppercase;letter-spacing:.04em;margin-top:1px}

/* modal body sections */
.mbody{overflow:hidden}
.msec{padding:18px 22px;border-bottom:1px solid #F3F4F6}
.msec-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:#9CA3AF;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.msec-title .dot{width:6px;height:6px;border-radius:50%;background:#0033A0}

/* Team summary in modal */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sum-col{display:flex;flex-direction:column;gap:5px}
.sum-eq-row{display:flex;align-items:center;gap:8px}
.sum-eq-label{font-size:.72rem;color:#374151;width:140px;flex-shrink:0}
.sum-eq-bg{flex:1;height:6px;background:#F3F4F6;border-radius:10px;overflow:hidden}
.sum-eq-fill{height:100%;border-radius:10px}
.sum-eq-val{font-size:.72rem;font-weight:700;width:26px;text-align:right}
.insights-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.ins-big{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:.73rem;font-weight:700}
.ins-big.best{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.ins-big.weak{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}

/* dist in modal */
.mdist{display:flex;align-items:center;gap:10px;margin-top:10px}
.mdist-bar{flex:1;display:flex;height:10px;border-radius:10px;overflow:hidden;gap:2px}
.mdist-legend{display:flex;gap:12px;flex-wrap:wrap}
.mdist-item{display:flex;align-items:center;gap:4px;font-size:.7rem;color:#6B7280}
.mdist-sq{width:10px;height:10px;border-radius:3px}

/* Employee cards */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;padding:18px 22px}
.ecard{border:1px solid #E5E7EB;border-radius:13px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.ecard:hover{border-color:#C7D2F5;box-shadow:0 4px 14px rgba(0,51,160,.08)}
.ech{padding:13px 14px 10px;display:flex;gap:10px;align-items:flex-start}
.eav{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#fff;flex-shrink:0}
.ename{font-size:.8rem;font-weight:700;line-height:1.3;color:#111827}
.ecargo{font-size:.68rem;color:#9CA3AF;margin-top:1px;line-height:1.3}
.ebadges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.evers{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:10px}
.evers.alta{background:#DBEAFE;color:#1D4ED8}
.evers.media{background:#FEF3C7;color:#B45309}
.evers.prof{background:#F3F4F6;color:#6B7280}

/* Radar SVG */
.radar-wrap{display:flex;justify-content:center;padding:2px 14px 10px}

/* Comp bars */
.comp-sec{padding:6px 14px 14px}
.comp-title{font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#9CA3AF;margin-bottom:6px}
.crow{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.clabel{font-size:.67rem;color:#374151;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbg{flex:1;height:5px;background:#F3F4F6;border-radius:10px;overflow:hidden}
.cfill{height:100%;border-radius:10px}
.cval{font-size:.68rem;font-weight:800;width:24px;text-align:right}

/* Potential */
.pot-row{display:flex;align-items:center;gap:7px;padding:7px 14px;background:#F8FAFF;border-top:1px solid #EEF2FF;border-bottom:1px solid #EEF2FF;margin:0}
.pot-l{font-size:.68rem;font-weight:700;color:#374151;width:60px}
.pot-bg{flex:1;height:6px;background:#E0E7FF;border-radius:10px;overflow:hidden}
.pot-fill{height:100%;border-radius:10px;background:#0033A0}
.pot-v{font-size:.72rem;font-weight:800;width:24px;text-align:right;color:#0033A0}

/* no data */
.nodata{padding:14px;font-size:.75rem;color:#9CA3AF;text-align:center}

/* empty state */
.empty{padding:60px 20px;text-align:center;color:#9CA3AF}
.empty p{font-size:.9rem;margin-top:10px}

/* scroll modal body */
.mscroll{max-height:calc(90vh - 200px);overflow-y:auto}
.mscroll::-webkit-scrollbar{width:4px}
.mscroll::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:10px}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

</div>

<!-- MODAL -->
<div class="moverlay" id="moverlay" onclick="if(event.target===this)closeModal()">

        <div>
          <div class="mname" id="m-name"></div>
          <div class="mcargo" id="m-cargo"></div>
          <div class="mmeta" id="m-meta"></div>
          <div class="mstats" id="m-stats"></div>
        </div>
      </div>
    </div>
    <div class="mscroll mbody" id="m-body"></div>

</div>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const AV_COLORS = ['#0033A0','#059669','#7C3AED','#D97706','#DC2626','#0284C7','#DB2777','#374151'];
function avColor(name){ let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))&0xffff; return AV_COLORS[h%AV_COLORS.length]; }
function initials(n){ return n.split(' ').filter(w=>w.length>2).slice(0,2).map(w=>w[0]).join('').toUpperCase()||n.slice(0,2).toUpperCase(); }

function clasifCode(c){
  return {' Muy Alto':'ma','Muy Alto':'ma','Alto':'al','Moderado':'mo','Medio':'mo','Bajo':'ba','Muy Bajo':'mb'}[c]||'sd';
}
function clasifLabel(c){ return c||'Sin dato'; }
function versCode(v){ if(!v) return 'sd'; if(v.includes('Alta')) return 'alta'; if(v.includes('Media')||v.includes('Medio')) return 'media'; return 'prof'; }
function versLabel(v){ return v?v.replace(' Versatilidad',''):'—'; }

function scoreColor(v){
  if(v===null||v===undefined) return '#9CA3AF';
  if(v>=75) return '#059669';
  if(v>=55) return '#D97706';
  return '#DC2626';
}

// ─── TEAM ANALYSIS ───────────────────────────────────────────────────────────
function teamStats(team){
  // avg scores per competency across members with data
  const sums={}, counts={};
  let totalPot=0, potCount=0;
  team.forEach(m=>{
    if(!m.scores) return;
    Object.entries(m.scores).forEach(([k,v])=>{
      if(v===null||v===undefined) return;
      sums[k]=(sums[k]||0)+v;
      counts[k]=(counts[k]||0)+1;
    });
    const potKey = Object.keys(m.scores).find(k=>k==='Potencial'||k==='Potential');
    if(potKey && m.scores[potKey]!==null){ totalPot+=m.scores[potKey]; potCount++; }
  });
  const avgs={};
  Object.keys(sums).forEach(k=>{ avgs[k]=Math.round(sums[k]/counts[k]); });
  
  const dist={ma:0,al:0,mo:0,ba:0,mb:0,sd:0};
  team.forEach(m=>{ dist[clasifCode(m.clasificacion)]++; });
  
  const sorted = Object.entries(avgs).sort((a,b)=>b[1]-a[1]);
  const best = sorted[0];
  const weak = sorted[sorted.length-1];
  
  return {avgs, dist, best, weak, avgPot: potCount?Math.round(totalPot/potCount):null, total:team.length};
}

function distBar(dist, total){
  if(!total) return '';
  const segs = [
    {k:'ma',label:'Muy Alto',hex:'#0284C7'},
    {k:'al',label:'Alto',hex:'#059669'},
    {k:'mo',label:'Moderado',hex:'#D97706'},
    {k:'ba',label:'Bajo',hex:'#DC2626'},
    {k:'mb',label:'Muy Bajo',hex:'#7C3AED'},
    {k:'sd',label:'Sin dato',hex:'#D1D5DB'},
  ].filter(s=>dist[s.k]>0);
  
  const barSegs = segs.map(s=>`<div class="dseg ${s.k}" style="flex:${dist[s.k]}" title="${s.label}: ${dist[s.k]}"></div>`).join('');
  const legend = segs.map(s=>`<div class="dleg-item"><div class="dleg-dot" style="background:${s.hex}"></div>${s.label}: ${dist[s.k]}</div>`).join('');
  return `<div class="dbar-wrap">
    <div class="dlabel">Distribución del equipo</div>
    <div class="dbar">${barSegs}</div>
    <div class="dlegend">${legend}</div>
  </div>`;
}

// ─── MINI RADAR CHART ──────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _rc=0;
function radarSVG(scores, size=110, color='#0033A0'){
  const entries = Object.entries(scores||{}).filter(([k,v])=>k!=='Potencial'&&k!=='Potential'&&v!==null&&v!==undefined);
  if(entries.length<3) return `<div style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#ccc">Sin datos</div>`;
  const id='rc'+(++_rc);
  const data=entries.map(([k,v])=>({l:k,v}));
  return '<canvas id="'+id+'" width="'+size+'" height="'+size+'" style="width:'+size+'px;height:'+size+'px;display:block" data-rd=\''+JSON.stringify(data)+'\' data-cl="'+color+'" data-sz="'+size+'" data-op="CC"></canvas>';
}
function initRadarCharts(){
  document.querySelectorAll('canvas[data-rd]').forEach(c=>{
    const data=JSON.parse(c.dataset.rd),cl=c.dataset.cl,sz=parseInt(c.dataset.sz),op=c.dataset.op||'CC';
    new Chart(c,{type:'radar',data:{labels:data.map(d=>d.l),datasets:[{data:data.map(d=>d.v),backgroundColor:cl+op,borderColor:cl,borderWidth:2,pointBackgroundColor:cl,pointBorderColor:'#ffffff',pointRadius:5,pointHoverRadius:0}]},options:{responsive:false,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{r:{min:0,max:100,ticks:{display:false,stepSize:20},grid:{color:'#D1D5DB',lineWidth:.5},angleLines:{color:'#D1D5DB',lineWidth:.5},pointLabels:{padding:8,display:true,color:'#374151',font:{size:Math.max(7,Math.min(11,sz/10)),weight:'500'},callback:function(label){if(label.length<=15)return label;const p=label.split(' ');const m=Math.ceil(p.length/2);return[p.slice(0,m).join(' '),p.slice(m).join(' ')];}}}}}});
  });
}

// ─── COMPETENCY BARS (employee) ──────────────────────────────────────────────
function compBars(scores){
  const compEntries = Object.entries(scores).filter(([k,v])=>k!=='Potencial'&&k!=='Potential');
  if(!compEntries.length) return '<div class="nodata">Sin datos de evaluación</div>';
  return compEntries.map(([k,v])=>{
    if(v===null||v===undefined) return '';
    const col=scoreColor(v);
    const shortK = k.length>18?k.slice(0,16)+'…':k;
    return `<div class="crow"><div class="clabel" title="${k}">${shortK}</div><div class="cbg"><div class="cfill" style="width:${v}%;background:${col}"></div></div><div class="cval" style="color:${col}">${v}</div></div>`;
  }).join('');
}

// ─── JEFE CARD HTML ──────────────────────────────────────────────────────────
function jefeCardHTML(j){
  const stats = teamStats(j.team);
  const preview = j.team.slice(0,4);
  const more = j.team.length - preview.length;
  const col = avColor(j.name);

  // compact team avg bars (top 5 comps)
  const topComps = Object.entries(stats.avgs).slice(0,5);
  const avgRows = topComps.map(([k,v])=>{
    const c=scoreColor(v), sk=k.length>16?k.slice(0,14)+'…':k;
    return `<div class="eq-row"><div class="eq-label" title="${k}">${sk}</div><div class="eq-bar-bg"><div class="eq-bar-fill" style="width:${v}%;background:${c}"></div></div><div class="eq-val" style="color:${c}">${v}</div></div>`;
  }).join('');

  const bestIns = stats.best?`<div class="ins best">✓ ${stats.best[0].length>18?stats.best[0].slice(0,16)+'…':stats.best[0]}: ${stats.best[1]}</div>`:'';
  const weakIns = stats.weak?`<div class="ins weak">⚠ ${stats.weak[0].length>18?stats.weak[0].slice(0,16)+'…':stats.weak[0]}: ${stats.weak[1]}</div>`:'';

  const memberRows = preview.map(m=>`
    <div class="mmb">
      <div style="overflow:hidden;min-width:0">
        <div class="mmbn">${m.name}</div>
        <div class="mmbcargo">${m.cargo||''}</div>
      </div>
      <span class="cpill ${clasifCode(m.clasificacion)}">${clasifLabel(m.clasificacion)}</span>
    </div>`).join('');

  const idx = curData.indexOf(j);
  return `<div class="jcard" data-jefe-idx="${idx}">
    <div class="jch">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div class="jav" style="background:${col}">${initials(j.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="jname">${j.name}</div>
          <div class="jcargo">${j.cargo||''}</div>
        </div>
      </div>
      <div class="jtbadge">${j.team.length} a cargo</div>
    </div>
    <div class="jcb">
      <div class="jdir">${j.dir_corp||j.dir_area||j.gerencia||''}</div>
      ${distBar(stats.dist, j.team.length)}
      ${topComps.length?`<div class="eq-resumen">
        <div class="eq-title">Promedio del equipo — competencias</div>
        ${avgRows}
        <div class="eq-insight">${bestIns}${weakIns}</div>
      </div>`:''}
      <div class="mteam">${memberRows}</div>
    </div>
    <div class="jcf">
      <span class="vermas">Ver detalle completo →</span>
      ${more>0?`<span class="morebadge">+${more} más</span>`:''}
    </div>
  </div>`;
}

// ─── EMPLOYEE CARD (modal) ────────────────────────────────────────────────────
function empCardHTML(m){
  const col = avColor(m.name);
  const hasScores = m.scores && Object.keys(m.scores).length>0;
  const potKey = hasScores ? Object.keys(m.scores).find(k=>k==='Potencial'||k==='Potential') : null;
  const potVal = potKey ? m.scores[potKey] : m.potential;
  const compScores = hasScores ? Object.fromEntries(Object.entries(m.scores).filter(([k])=>k!=='Potencial'&&k!=='Potential')) : {};

  return `<div class="ecard">
    <div class="ech">
      <div class="eav" style="background:${col}">${initials(m.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="ename">${m.name}</div>
        <div class="ecargo">${m.cargo||''}</div>
        <div class="ebadges">
          <span class="cpill ${clasifCode(m.clasificacion)}">${clasifLabel(m.clasificacion)}</span>
          ${m.versatilidad?`<span class="evers ${versCode(m.versatilidad)}">${versLabel(m.versatilidad)}</span>`:''}
        </div>
      </div>
      <div class="radar-wrap" style="padding:0;margin-top:2px">${hasScores?radarSVG(compScores,88,col):''}</div>
    </div>
    ${potVal!==null&&potVal!==undefined?`<div class="pot-row"><div class="pot-l">Potencial</div><div class="pot-bg"><div class="pot-fill" style="width:${potVal}%;background:${col}"></div></div><div class="pot-v" style="color:${col}">${potVal}</div></div>`:''}
    ${hasScores?`<div class="comp-sec"><div class="comp-title">Competencias</div>${compBars(compScores)}</div>`:'<div class="nodata">Sin datos de evaluación disponibles</div>'}
  </div>`;
}

// ─── OPEN MODAL ──────────────────────────────────────────────────────────────
function openModal(jefeName){
  const j = curData.find(x=>x.name===jefeName);
  if(!j) return;

  const col = avColor(j.name);
  document.getElementById('m-av').textContent = initials(j.name);
  document.getElementById('m-av').style.background = col;
  document.getElementById('m-name').textContent = j.name;
  document.getElementById('m-cargo').textContent = j.cargo||'';
  document.getElementById('m-meta').textContent = [j.dir_corp||j.dir_area, j.gerencia].filter(Boolean).join(' · ');

  const stats = teamStats(j.team);
  const statItems = [
    {n:j.team.length, l:'A cargo'},
    {n:(stats.dist.ma||0)+(stats.dist.al||0), l:'Alto perf.'},
    {n:stats.dist.ma||0, l:'Muy Alto'},
    ...(stats.avgPot!==null?[{n:stats.avgPot, l:'Pot. prom.'}]:[]),
  ];
  document.getElementById('m-stats').innerHTML = statItems.map(s=>`<div class="mst"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join('');

  // Build modal body
  const allComps = Object.keys(stats.avgs);
  const sortedComps = Object.entries(stats.avgs).sort((a,b)=>b[1]-a[1]);
  const best3 = sortedComps.slice(0,3);
  const weak3 = sortedComps.slice(-3).reverse();

  // Section 1: Team summary
  const avgBarsFull = sortedComps.map(([k,v])=>{
    const c=scoreColor(v), sk=k.length>22?k.slice(0,20)+'…':k;
    return `<div class="sum-eq-row"><div class="sum-eq-label" title="${k}">${sk}</div><div class="sum-eq-bg"><div class="sum-eq-fill" style="width:${v}%;background:${c}"></div></div><div class="sum-eq-val" style="color:${c}">${v}</div></div>`;
  }).join('');

  const bestIns = best3.map(([k,v])=>`<div class="ins-big best">✓ ${k}: ${v}</div>`).join('');
  const weakIns = weak3.map(([k,v])=>`<div class="ins-big weak">⚠ ${k}: ${v}</div>`).join('');

  const distFull = distBar(stats.dist, j.team.length);

  const sec1 = `<div class="msec">
    <div class="msec-title"><div class="dot"></div>Resumen del Equipo</div>
    ${distFull}
    <div style="margin-top:12px">
      <div style="font-size:.7rem;font-weight:700;color:#374151;margin-bottom:8px">Promedio del equipo por competencia</div>
      <div style="display:flex;flex-direction:column;gap:4px">${avgBarsFull}</div>
    </div>
    <div style="margin-top:10px">
      <div style="font-size:.7rem;font-weight:700;color:#059669;margin-bottom:4px">✓ Fortalezas del equipo</div>
      <div class="insights-row">${bestIns}</div>
      <div style="font-size:.7rem;font-weight:700;color:#DC2626;margin-bottom:4px;margin-top:8px">⚠ Áreas de desarrollo</div>
      <div class="insights-row">${weakIns}</div>
    </div>
  </div>`;

  // Section 2: Individual cards
  const empCards = j.team.map(empCardHTML).join('');
  const sec2 = `<div class="msec"><div class="msec-title"><div class="dot"></div>Resultados Individuales (${j.team.length} personas)</div></div><div class="emp-grid">${empCards}</div>`;

  document.getElementById('m-body').innerHTML = sec1 + sec2;
  document.getElementById('moverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('moverlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ─── FILTER / RENDER ─────────────────────────────────────────────────────────
function doFilter(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const dir=document.getElementById('fdir').value;
  const clasif=document.getElementById('fclasif').value;
  filtered=curData.filter(j=>{
    const mq=!q||j.name.toLowerCase().includes(q)||(j.cargo||'').toLowerCase().includes(q)||(j.dir_corp||'').toLowerCase().includes(q)||(j.dir_area||'').toLowerCase().includes(q);
    const mdir=!dir||j.dir_corp===dir||j.dir_area===dir||j.gerencia===dir;
    const mcl=!clasif||j.team.some(m=>m.clasificacion===clasif);
    return mq&&mdir&&mcl;
  });
  renderGrid();
}

function populateDirFilter(){
  const dirs=[...new Set(curData.map(j=>j.dir_corp||j.dir_area).filter(Boolean))].sort();
  const sel=document.getElementById('fdir');
  sel.innerHTML='<option value="">Todas las Direcciones</option>';
  dirs.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d.length>45?d.slice(0,42)+'…':d;sel.appendChild(o);});

  
}

function renderGrid(){
  const grid=document.getElementById('maingrid');
  const empty=document.getElementById('empty');
  const rc=document.getElementById('rcount');
  if(!filtered.length){grid.innerHTML='';empty.style.display='block';rc.textContent='';return;}
  empty.style.display='none';
  grid.innerHTML=filtered.map(jefeCardHTML).join('');initRadarCharts();
  const totalMembers=filtered.reduce((a,j)=>a+j.team.length,0);
  rc.textContent=`${filtered.length} jefe${filtered.length!==1?'s':''} · ${totalMembers} evaluados`;

  grid.onclick = function(e) {
    const card = e.target.closest('[data-jefe-idx]');
    if (card) {
      const idx = parseInt(card.getAttribute('data-jefe-idx'));
      const j = curData[idx];
      if (j) openModal(j.name);
    }
  };
}

function updateHeaderStats(){
  const all=curData.flatMap(j=>j.team);
  const alta=all.filter(m=>m.versatilidad&&m.versatilidad.includes('Alta')).length;
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-jefes').textContent=curData.length;
  document.getElementById('s-alta').textContent=alta;
}

function switchTab(tab, btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curTab=tab; curData=DATA[tab];
  document.getElementById('q').value='';
  document.getElementById('fdir').value='';
  document.getElementById('fclasif').value='';
  filtered=[...curData];
  populateDirFilter(); updateHeaderStats(); renderGrid();

  grid.onclick = function(e) {
    const card = e.target.closest('[data-jefe-idx]');
    if (card) {
      const idx = parseInt(card.getAttribute('data-jefe-idx'));
      const j = curData[idx];
      if (j) openModal(j.name);
    }
  };
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function(){
  document.getElementById('tc-est').textContent=`(${DATA.est.length})`;
  document.getElementById('tc-op').textContent=`(${DATA.op.length})`;
  filtered=[...curData];
  populateDirFilter(); updateHeaderStats(); renderGrid();
})();
</script>
</body>
