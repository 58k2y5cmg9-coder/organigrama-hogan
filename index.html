<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Resultados de Hogan · Claro Colombia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* ── THEME ────────────────────────────────────────────────────── */
:root{--alta:#059669;--alta-bg:#D1FAE5;--media:#EA580C;--media-bg:#FFEDD5;--prof:#0033A0;--prof-bg:#DBEAFE;
  --bg:#EEF1F8;--bg2:#E2E6EF;--card-bg:#fff;--text:#111827;--text2:#374151;--text3:#6B7280;--text4:#9CA3AF;
  --border:#E2E6EF;--border2:#E5E7EB;--border3:#F3F4F6;--surface:#F9FAFB;--surface2:#F3F4F6;--modal-bg:#fff;
  --input-bg:#F9FAFB;--tab-bg:#fff;--hover:#F8FAFF;--lgtxt:rgba(0,0,0,.55);--lgtxt2:rgba(255,255,255,.5);
  --shadow:rgba(0,51,160,.13);--mback:rgba(0,0,0,.65);}
body.dark{--bg:#0B1121;--bg2:#1E293B;--card-bg:#1E293B;--text:#F1F5F9;--text2:#CBD5E1;--text3:#94A3B8;--text4:#64748B;
  --border:#334155;--border2:#334155;--border3:#1E293B;--surface:#1E293B;--surface2:#334155;--modal-bg:#1E293B;
  --input-bg:#334155;--tab-bg:#1E293B;--hover:#1E293B;--lgtxt:rgba(255,255,255,.55);--lgtxt2:rgba(0,0,0,.5);
  --shadow:rgba(0,0,0,.4);--mback:rgba(0,0,0,.8);}
body{background:var(--bg);color:var(--text);}

.hdr{background:#7C1D24;height:60px;display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr-logo{width:36px;height:36px;background:#fff;border-radius:9px;display:grid;place-items:center;font-weight:800;color:#7C1D24;font-size:1rem;flex-shrink:0}
.hdr h1{color:#fff;font-size:1rem;font-weight:700}
.hdr-sub{color:var(--lgtxt);font-size:.7rem;margin-top:1px}
.hdr-stats{margin-left:auto;display:flex;gap:20px}
.hs .n{color:#fff;font-size:1.2rem;font-weight:700;line-height:1;text-align:right}
.hs .l{color:var(--lgtxt2);font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;text-align:right}
#theme-btn{margin-left:10px;background:rgba(255,255,255,.2);border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:1rem;display:grid;place-items:center;transition:background .15s}
#theme-btn:hover{background:rgba(255,255,255,.35)}

.tabs{background:var(--tab-bg);border-bottom:1px solid var(--border);display:flex;padding:0 24px}
.tab{padding:12px 18px;font-size:.82rem;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s}
.tab.on{color:#0033A0;border-bottom-color:#0033A0}
.tab span{font-weight:400;color:var(--text4);font-size:.75rem;margin-left:5px}

.fbar{background:var(--card-bg);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.srch{position:relative;flex:1;min-width:180px;max-width:320px}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text4);pointer-events:none}
.srch input{width:100%;padding:7px 9px 7px 28px;border:1px solid #D1D5DB;border-radius:8px;font-size:.8rem;outline:none;background:var(--input-bg);color:var(--text)}
.srch input:focus{border-color:#0033A0;background:var(--card-bg)}
select.fsel{padding:7px 10px;border:1px solid #D1D5DB;border-radius:8px;font-size:.79rem;background:var(--input-bg);color:var(--text2);outline:none;cursor:pointer}
.rcount{margin-left:auto;font-size:.72rem;color:var(--text4)}

.wrap{padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* JEFE CARD */
.jcard{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .17s,box-shadow .17s,border-color .17s}
.jcard:hover{transform:translateY(-3px);box-shadow:0 10px 30px var(--shadow);border-color:var(--text3)}
.jch{padding:14px 16px;position:relative;overflow:hidden}
.jch::after{content:'';position:absolute;right:-15px;top:-15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.09)}
.jav{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#fff;flex-shrink:0;background:rgba(255,255,255,.2)}
.jname{color:#fff;font-weight:700;font-size:.85rem;line-height:1.3}
.jcargo{color:rgba(255,255,255,.6);font-size:.69rem;margin-top:2px}
.jtbadge{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.2);color:#fff;padding:3px 9px;border-radius:20px;font-size:.75rem;font-weight:700}
.jch-inner{display:flex;gap:10px;align-items:flex-start}
.jch-radar{flex-shrink:0;margin-left:auto}

.jcb{padding:12px 16px}
.jdir{font-size:.67rem;color:var(--text4);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* DIST BAR */
.dbar-wrap{margin-bottom:10px}
.dlabel{font-size:.66rem;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.dbar{display:flex;height:7px;border-radius:10px;overflow:hidden;gap:2px;margin-bottom:4px}
.dseg{border-radius:4px;min-width:3px}
.dlegend{display:flex;gap:8px;flex-wrap:wrap}
.dleg-item{display:flex;align-items:center;gap:3px;font-size:.63rem;color:var(--text3)}
.dleg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* TEAM SUMMARY */
.eq-resumen{background:var(--hover);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.eq-title{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:7px}
.eq-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.eq-label{font-size:.7rem;color:var(--text2);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq-bar-bg{flex:1;height:5px;background:var(--border2);border-radius:10px;overflow:hidden}
.eq-bar-fill{height:100%;border-radius:10px}
.eq-val{font-size:.69rem;font-weight:700;width:24px;text-align:right}
.eq-insight{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ins{padding:3px 8px;border-radius:20px;font-size:.65rem;font-weight:700}
.ins.best{background:#D1FAE5;color:#065F46}
.ins.weak{background:#FFF7ED;color:#9A3412}

/* MINI TEAM */
.mteam{display:flex;flex-direction:column;gap:3px}
.mmb{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border3);gap:6px}
.mmb:last-child{border-bottom:none}
.mmbn{font-size:.75rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px;color:var(--text)}
.mmb.is-jefe .mmbn{color:#0033A0;text-decoration:underline;text-decoration-color:#93C5FD;text-underline-offset:2px;cursor:pointer;font-weight:700}
.mmb.is-jefe .mmbn:hover{color:#1D4ED8}
.jefe-badge{font-size:.58rem;background:#EEF2FF;color:#4338CA;padding:1px 5px;border-radius:10px;font-weight:700;flex-shrink:0;border:1px solid #C7D2FE}
.mmbcargo{font-size:.64rem;color:var(--text4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px}

/* vers / clasif pills */
.cpill{padding:2px 7px;border-radius:20px;font-size:.62rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.cpill.ma{background:#E0F2FE;color:#0369A1}.cpill.al{background:#D1FAE5;color:#065F46}
.cpill.mo{background:#FEF3C7;color:#92400E}.cpill.ba{background:#FEE2E2;color:#991B1B}
.cpill.mb{background:#EDE9FE;color:#5B21B6}.cpill.sd{background:var(--surface2);color:var(--text3)}
.vpill{padding:2px 6px;border-radius:10px;font-size:.6rem;font-weight:700;flex-shrink:0}
.vpill.alta{background:var(--alta-bg);color:var(--alta)}
.vpill.media{background:var(--media-bg);color:var(--media)}
.vpill.prof{background:var(--prof-bg);color:var(--prof)}

.jcf{padding:10px 16px;border-top:1px solid var(--border3);display:flex;justify-content:space-between;align-items:center;gap:8px}
.vermas{font-size:.73rem;color:#0033A0;font-weight:700}
.morebadge{font-size:.68rem;color:var(--text4)}
.pdf-btn{font-size:.68rem;font-weight:700;color:var(--text3);background:var(--surface);border:1px solid var(--border2);border-radius:7px;padding:4px 9px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s}
.pdf-btn:hover{background:var(--surface2);color:var(--text2)}
.pdf-btn svg{width:12px;height:12px}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:var(--mback);z-index:500;backdrop-filter:blur(4px);align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.moverlay.open{display:flex}
.modal{background:var(--modal-bg);border-radius:20px;width:100%;max-width:1060px;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:pop .2s cubic-bezier(.34,1.56,.64,1);margin:auto}
@keyframes pop{from{opacity:0;transform:scale(.93) translateY(16px)}to{opacity:1;transform:none}}
.mhdr{padding:20px 24px;border-radius:20px 20px 0 0;position:relative;overflow:hidden}
.mhdr::before{content:'';position:absolute;right:-50px;top:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06)}
.mav-lg{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;color:#fff;flex-shrink:0}
.mname{color:#fff;font-size:1.15rem;font-weight:800;letter-spacing:-.02em;line-height:1.2}
.mcargo{color:rgba(255,255,255,.65);font-size:.79rem;margin-top:2px}
.mmeta{color:rgba(255,255,255,.45);font-size:.69rem;margin-top:3px}
.mclose{position:absolute;top:14px;left:48px;width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;font-size:1.1rem;display:grid;place-items:center;z-index:10}
.mback-btn{position:absolute;top:14px;left:14px;width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;font-size:1.1rem;display:none;place-items:center;z-index:10;line-height:1}
.mclose:hover{background:rgba(255,255,255,.25)}
.mstats{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.mst{background:rgba(255,255,255,.13);padding:7px 13px;border-radius:9px}
.mst .n{color:#fff;font-size:1.2rem;font-weight:800;line-height:1}
.mst .l{color:rgba(255,255,255,.55);font-size:.62rem;text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.mhdr-inner{display:flex;gap:14px;align-items:flex-start;padding-left:90px}
.mhdr-radar{flex-shrink:0;margin-left:auto}
.mpdf-btn{position:absolute;top:14px;left:82px;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.8);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:4px}
.mpdf-btn:hover{background:rgba(255,255,255,.25)}

.mbody{overflow:hidden}
.msec{padding:18px 22px;border-bottom:1px solid var(--border3)}
.msec-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text4);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.msec-dot{width:6px;height:6px;border-radius:50%;background:#0033A0;flex-shrink:0}
.sum-eq-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sum-eq-label{font-size:.72rem;color:var(--text2);width:155px;flex-shrink:0}
.sum-eq-bg{flex:1;height:6px;background:var(--border3);border-radius:10px;overflow:hidden}
.sum-eq-fill{height:100%;border-radius:10px}
.sum-eq-val{font-size:.72rem;font-weight:700;width:26px;text-align:right}
.insights-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.ins-big{padding:5px 10px;border-radius:8px;font-size:.73rem;font-weight:700}
.ins-big.best{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.ins-big.weak{background:#FFF7ED;color:#9A3412;border:1px solid #FED7AA}

.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:12px;padding:18px 22px}
.ecard{border:1px solid var(--border2);border-radius:13px;overflow:hidden;transition:border-color .15s,box-shadow .15s;background:var(--card-bg)}
.ecard:hover{border-color:var(--text3);box-shadow:0 4px 14px var(--shadow)}
.ecard.is-jefe{border:2px solid #818CF8}
.ecard-jefe-link{display:none;align-items:center;gap:5px;padding:6px 14px;background:#EEF2FF;font-size:.71rem;font-weight:700;color:#4338CA;cursor:pointer;border-top:1px solid #C7D2FE}
.ecard-jefe-link:hover{background:#E0E7FF}
.ecard.is-jefe .ecard-jefe-link{display:flex}
.ech{padding:13px 14px 10px;display:flex;gap:10px;align-items:flex-start}
.eav{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#fff;flex-shrink:0}
.ename{font-size:.8rem;font-weight:700;line-height:1.3;color:var(--text)}
.ecargo{font-size:.68rem;color:var(--text4);margin-top:1px;line-height:1.3}
.ebadges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.evers{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:10px}
.evers.alta{background:var(--alta-bg);color:var(--alta)}
.evers.media{background:var(--media-bg);color:var(--media)}
.evers.prof{background:var(--prof-bg);color:var(--prof)}

.comp-sec{padding:6px 14px 14px}
.comp-title{font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text4);margin-bottom:6px}
.crow{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.clabel{font-size:.67rem;color:var(--text2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbg{flex:1;height:5px;background:var(--border3);border-radius:10px;overflow:hidden}
.cfill{height:100%;border-radius:10px}
.cval{font-size:.68rem;font-weight:800;width:24px;text-align:right}
.pot-row{display:flex;align-items:center;gap:7px;padding:7px 14px;background:var(--hover);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.pot-l{font-size:.68rem;font-weight:700;color:var(--text2);width:60px;flex-shrink:0}
.pot-bg{flex:1;height:6px;background:var(--border2);border-radius:10px;overflow:hidden}
.pot-fill{height:100%;border-radius:10px}
.pot-v{font-size:.72rem;font-weight:800;width:24px;text-align:right}

.nodata{padding:14px;font-size:.75rem;color:var(--text4);text-align:center}
.empty{padding:60px 20px;text-align:center;color:var(--text4)}
.empty p{font-size:.9rem;margin-top:10px}
.empty svg{color:var(--text4)}
.mscroll{max-height:calc(92vh - 220px);overflow-y:auto}
.mscroll::-webkit-scrollbar{width:4px}
.mscroll::-webkit-scrollbar-thumb{background:var(--text4);border-radius:10px}

.pdf-loading{display:none;position:fixed;inset:0;background:rgba(0,51,160,.7);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#fff;font-size:.9rem;font-weight:600;backdrop-filter:blur(4px)}
.pdf-loading.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* Toolbar buttons */
.fbtn{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:.78rem;font-weight:600;background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{background:#EEF2FF;border-color:#0033A0;color:#0033A0}
.fbtn.on{background:#0033A0;color:#fff;border-color:#0033A0}

/* Compare mode */
.cmp-bar{display:none;align-items:center;gap:10px;padding:8px 24px;background:var(--hover);border-bottom:1px solid var(--border);font-size:.78rem;color:var(--text)}
.cmp-bar.show{display:flex}
.cmp-badge{background:#0033A0;color:#fff;padding:2px 9px;border-radius:12px;font-size:.7rem;font-weight:700}
.cmp-clear{font-size:.7rem;color:var(--text3);cursor:pointer;text-decoration:underline}
.cmp-clear:hover{color:#DC2626}
.cmp-clear.hide{display:none}
.jcard.cmp-sel{outline:3px solid #0033A0;outline-offset:2px;transform:translateY(-2px)}
.jcard .cmp-chk{display:none;position:absolute;top:8px;right:8px;z-index:5;width:22px;height:22px;border-radius:50%;background:var(--card-bg);border:2px solid #93C5FD;align-items:center;justify-content:center;font-size:.7rem;color:#fff;font-weight:700;cursor:pointer;transition:all .15s}
.cmp-active .cmp-chk{display:flex}
.cmp-sel .cmp-chk{background:#0033A0;border-color:#0033A0}

/* Comparison modal */
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.comp-side{display:flex;flex-direction:column;align-items:center;gap:6px}
.comp-side .clabel{font-size:.8rem;font-weight:700;color:var(--text2);text-align:center;line-height:1.3}
.comp-side .csub{font-size:.65rem;color:var(--text4)}
.comp-table{width:100%;border-collapse:collapse;font-size:.74rem}
.comp-table th{background:var(--surface);padding:6px 8px;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border2);text-align:center;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em}
.comp-table th:first-child{text-align:left}
.comp-table td{padding:5px 8px;border-bottom:1px solid var(--border3);text-align:center}
.comp-table td:first-child{text-align:left;font-weight:600;color:var(--text)}
.comp-diff{font-weight:700}
.comp-diff.pos{color:#059669}
.comp-diff.neg{color:#DC2626}
.comp-diff.zero{color:var(--text4)}

/* Heatmap */
.heatmap-wrap{overflow-x:auto;background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:12px;grid-column:1/-1;animation:fadeSlideUp .3s ease}
.heatmap-table{border-collapse:collapse;font-size:.72rem;width:100%;min-width:500px}
.heatmap-table th{position:sticky;top:0;background:var(--surface);padding:5px 6px;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border2);text-align:center;white-space:nowrap;font-size:.62rem;text-transform:uppercase;letter-spacing:.04em}
.heatmap-table td{padding:4px;text-align:center;border:1px solid var(--border3);font-weight:600;font-size:.68rem}
.heatmap-name{text-align:left!important;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;padding:4px 8px!important;font-size:.7rem}
.heatmap-cell{min-width:28px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);border-radius:2px;cursor:pointer;transition:transform .12s}
.heatmap-cell:hover{transform:scale(1.2);z-index:2}
.heatmap-name[data-tip]:hover::after,.heatmap-table th[data-tip]:hover::after{white-space:normal;max-width:200px}

/* Tooltip via data-tip */
[data-tip]{position:relative;cursor:pointer}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:3px 8px;border-radius:5px;font-size:.62rem;font-weight:500;white-space:nowrap;z-index:999;box-shadow:0 3px 10px rgba(0,0,0,.3);pointer-events:none;line-height:1.4}
[data-tip]:hover::before{content:'';position:absolute;bottom:calc(100%+1px);left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1F2937;z-index:999;pointer-events:none}

/* Card animation */
.jcard,.ecard{animation:fadeSlideUp .3s ease both}
.jcard:nth-child(2),.ecard:nth-child(2){animation-delay:.04s}
.jcard:nth-child(3),.ecard:nth-child(3){animation-delay:.08s}
.jcard:nth-child(4),.ecard:nth-child(4){animation-delay:.12s}
.jcard:nth-child(5),.ecard:nth-child(5){animation-delay:.16s}
.jcard:nth-child(n+6),.ecard:nth-child(n+6){animation-delay:.2s}
</style>

/* ── TEAM STATS ──────────────────────────────────────────────────────── */
function teamStats(team){
  const sums={},counts={};let tp=0,pc=0;
  team.forEach(m=>{
    if(!m.scores)return;
    Object.entries(m.scores).forEach(([k,v])=>{if(v===null||v===undefined||k==='Potencial'||k==='Potential')return;sums[k]=(sums[k]||0)+v;counts[k]=(counts[k]||0)+1;});
    const pk=Object.keys(m.scores||{}).find(k=>k==='Potencial'||k==='Potential');
    if(pk&&m.scores[pk]!=null){tp+=m.scores[pk];pc++;}
  });
  const avgs={};Object.keys(sums).forEach(k=>{avgs[k]=Math.round(sums[k]/counts[k]);});
  const dist={ma:0,al:0,mo:0,ba:0,mb:0,sd:0};
  team.forEach(m=>{dist[cc(m.clasificacion)]++;});
  const sorted=Object.entries(avgs).sort((a,b)=>b[1]-a[1]);
  return{avgs,dist,best:sorted[0],weak:sorted[sorted.length-1],avgPot:pc?Math.round(tp/pc):null};
}

mpulsar la Estrategia":{"def":"Capacidad para definir, comunicar y ejecutar una visión de largo plazo, alineando recursos, decisiones e iniciativas con los objetivos estratégicos y las prioridades del negocio.","alto":"Mantiene una visión amplia del negocio, anticipando escenarios futuros y alineando sus acciones con objetivos de largo plazo.","medio":"Comprende la estrategia organizacional y contribuye a su ejecución, combinando perspectivas tácticas y estratégicas.","bajo":"Tiende a enfocarse principalmente en la operación y en los resultados inmediatos, requiriendo apoyo para ampliar su visión de largo plazo.","dominio":"LIDERAZGO"},"Desarrollo de Otros":{"def":"Capacidad para formar y potenciar el aprendizaje y desarrollo de otros. Implica un genuino esfuerzo para fomentar el aprendizaje a largo plazo y/o el desarrollo de otros, más allá de su responsabilidad específica y cotidiana.","alto":"Dedica tiempo y esfuerzo a fortalecer las capacidades de las personas, promoviendo activamente su crecimiento y desarrollo.","medio":"Apoya el desarrollo de otros cuando identifica oportunidades o necesidades específicas dentro del equipo.","bajo":"Tiende a concentrarse en el cumplimiento de objetivos y resultados, brindando menor acompañamiento al crecimiento de los colaboradores.","dominio":"LIDERAZGO"},"Impulsar la Innovación":{"def":"Capacidad para promover y materializar nuevas ideas, enfoques y soluciones que generen valor para la organización, impulsando la mejora continua, la transformación y la adaptación al cambio.","alto":"Busca constantemente nuevas ideas y enfoques, promoviendo soluciones creativas para generar mejoras y valor.","medio":"Mantiene apertura hacia nuevas propuestas, evaluando su viabilidad antes de implementarlas.","bajo":"Prefiere soluciones conocidas y metodologías probadas, priorizando la estabilidad y la eficiencia operativa.","dominio":"NEGOCIOS"},"Escuchar a Otros":{"def":"Capacidad para comprender e integrar diversas perspectivas, necesidades e intereses, fortaleciendo la toma de decisiones y la construcción de relaciones estratégicas.","alto":"Demuestra una alta disposición para comprender perspectivas diversas, fomentando espacios de diálogo y participación.","medio":"Escucha y considera diferentes puntos de vista, integrándolos cuando son relevantes para la situación.","bajo":"Tiende a enfocarse principalmente en los hechos y resultados, pudiendo dedicar menos atención a las necesidades o percepciones de los demás.","dominio":"INTERPERSONAL"},"Influenciar a otros":{"def":"Capacidad para generar compromiso y movilizar a personas, equipos y grupos de interés hacia el logro de objetivos estratégicos mediante credibilidad, visión y comunicación efectiva.","alto":"Logra generar adhesión y compromiso en otros, comunicando sus ideas de manera persuasiva y movilizando acciones.","medio":"Influye a través de argumentos sólidos y relaciones de confianza, adaptando su estilo según la situación.","bajo":"Tiende a influir principalmente desde su conocimiento técnico o experiencia, mostrando menor inclinación a persuadir activamente.","dominio":"INTERPERSONAL"},"Responsabilidad":{"def":"Capacidad para asumir la responsabilidad por las decisiones y resultados de su ámbito de gestión, garantizando el cumplimiento de los objetivos organizacionales y actuando con integridad.","alto":"Asume con compromiso sus obligaciones, mantiene consistencia en el cumplimiento de acuerdos y responde por los resultados obtenidos.","medio":"Cumple adecuadamente con sus compromiso y mantiene un seguimiento razonable de los mismos.","bajo":"Puede mostrar una orientación más flexible frente a normas, procesos o compromisos, requiriendo mayor estructura y seguimiento.","dominio":"INTERPERSONAL"},"Comunicación de Impacto":{"def":"Capacidad para comunicar información estratégica de manera clara, persuasiva y orientada a la toma de decisiones, adaptando el mensaje a diferentes audiencias.","alto":"Comunica sus ideas de manera clara, segura y persuasiva, logrando captar la atención e influir en diferentes audiencias.","medio":"Se comunica efectivamente en la mayoría de situaciones, adaptando su mensaje según el contexto y los interlocutores.","bajo":"Tiende a utilizar un estilo de comunicación más reservado o técnico, requiriendo mayor esfuerzo para generar impacto o visibilidad en sus mensajes.","dominio":"NEGOCIOS"}},"V. Gerente":{"Toma de Decisiones":{"def":"Capacidad para analizar información, evaluar riesgos y oportunidades, Asi como la  toma decisiones oportunas y fundamentadas que contribuyan al logro de los objetivos estratégicos de la organización.","alto":"Toma decisiones de manera estructurada y bien fundamentada, evaluando riesgos, alternativas e impactos de forma rapida.","medio":"Toma decisiones adecuadas, utilizando la información disponible y consultando cuando la situación lo requiere.","bajo":"Tiende a retrasar o escalar decisiones que podría asumir directamente, afectando la oportunidad en la respuesta o la ejecución.","dominio":"LIDERAZGO"},"Construcción de Equipos":{"def":"Capacidad para conformar, fortalecer y desarrollar equipos de trabajo efectivos, promoviendo la colaboración y el cumplimiento de objetivos planteados.","alto":"Fortalece el desempeño del equipo, promueve la colaboración y desarrolla las capacidades de las personas para alcanzar los resultados del área.","medio":"Mantiene un ambiente de trabajo adecuado y facilita la coordinación entre los integrantes del equipo para cumplir los objetivos establecidos.","bajo":"Presenta dificultades para integrar al equipo, generar compromiso o desarrollar las capacidades necesarias para alcanzar los resultados esperados.","dominio":"LIDERAZGO"},"Impulsar la Ejecución":{"def":"Capacidad para asegurar el cumplimiento oportuno y eficiente de las actividades, metas y procesos definidos.","alto":"Asegura el cumplimiento de los planes de trabajo mediante seguimiento constante, priorización efectiva y gestión oportuna de desviaciones.","medio":"Mantiene el avance de las actividades y realiza seguimiento a los compromisos más relevantes para garantizar los resultados esperados.","bajo":"Puede presentar dificultades para dar seguimiento, gestionar prioridades o asegurar el cumplimiento oportuno de los compromisos.","dominio":"LIDERAZGO"},"Delegación":{"def":"Capacidad para asignar tareas y responsabilidades de manera clara, asegurando su adecuada ejecución y seguimiento.","alto":"Asigna responsabilidades de manera clara, empodera a las personas y realiza seguimiento efectivo sin necesidad de intervenir constantemente.","medio":"Distribuye tareas de acuerdo con las capacidades del equipo y realiza seguimiento cuando las situaciones lo requieren.","bajo":"Tiende a centralizar actividades o a realizar un seguimiento insuficiente, limitando la autonomía y efectividad del equipo.","dominio":"LIDERAZGO"},"Visión del Negocio":{"def":"Capacidad para comprender el funcionamiento del negocio y reconocer cómo su rol y sus acciones impactan en los resultados del área y de la organización.","alto":"Comprende cómo las decisiones y resultados de su área impactan los objetivos del negocio, orientando las acciones del equipo hacia la generación de valor.","medio":"Reconoce la relación entre las actividades de su área y los resultados organizacionales, alineando su gestión con las prioridades establecidas.","bajo":"Se enfoca principalmente en la operación de corto plazo, con menor comprensión del impacto de sus decisiones en los resultados del negocio.","dominio":"NEGOCIOS"},"Resolución de Problemas":{"def":"Capacidad para identificar, analizar y dar solución a problemas.","alto":"Identifica oportunamente problemas, analiza sus causas y lidera la implementación de soluciones efectivas para evitar su recurrencia.","medio":"Resuelve los problemas habituales de su gestión y busca apoyo cuando enfrenta situaciones de mayor complejidad.","bajo":"Puede presentar dificultades para identificar causas raíz o implementar soluciones sostenibles ante problemas recurrentes.","dominio":"NEGOCIOS"},"Impulsar la Diversidad":{"def":"Capacidad para promover el respeto por las diferencias individuales y contribuir a un ambiente de trabajo inclusivo.","alto":"Promueve activamente el respeto por las diferencias, fomenta la participación de diversas perspectivas y contribuye a un ambiente inclusivo.","medio":"Mantiene relaciones respetuosas y favorece la participación de los diferentes integrantes del equipo.","bajo":"Puede mostrar dificultades para valorar perspectivas distintas o generar espacios de participación equitativos.","dominio":"INTERPERSONAL"},"Trabajo en Equipo":{"def":"Capacidad para colaborar activamente con otros, compartiendo información y esfuerzos para el logro de objetivos comunes.","alto":"Fomenta la colaboración entre áreas y personas, compartiendo información y recursos para alcanzar objetivos comunes.","medio":"Trabaja de manera colaborativa con otros y contribuye al logro de metas compartidas cuando la situación lo requiere.","bajo":"Tiende a trabajar de manera aislada o a priorizar los objetivos individuales sobre los colectivos.","dominio":"INTERPERSONAL"},"Responsabilidad":{"def":"Capacidad para asumir la responsabilidad por las decisiones y resultados de su ámbito de gestión, garantizando el cumplimiento de los objetivos organizacionales y actuando con integridad.","alto":"Asume la responsabilidad por los resultados de su gestión, cumple sus compromisos y actúa con integridad frente a las decisiones que toma.","medio":"Responde adecuadamente por sus responsabilidades y cumple con los compromisos establecidos en su rol.","bajo":"Puede requerir mayor seguimiento para asegurar el cumplimiento de compromisos o la asunción de responsabilidades frente a los resultados.","dominio":"INTERPERSONAL"},"Manejo de la Ambigüedad":{"def":"Se maneja cómodamente en situaciones turbias e impredecibles.","alto":"Mantiene la efectividad ante cambios, incertidumbre o información incompleta, guiando al equipo en contextos de transformación.","medio":"Se adapta a situaciones cambiantes y mantiene el foco en los resultados aun cuando existen elementos de incertidumbre.","bajo":"Prefiere contextos definidos y puede requerir mayor claridad, estructura o dirección cuando enfrenta escenarios ambiguos.","dominio":"INTERPERSONAL"}}};
function getCompLevel(score){if(score>=70)return 'alto';if(score>=50)return 'medio';return 'bajo';}
function getCompDesc(perfil,comp,score){
  let d=COMP_DESC[perfil]&&COMP_DESC[perfil][comp];
  if(!d){const alt=perfil==='V. Ejecutivo'?'V. Gerente':'V. Ejecutivo';d=COMP_DESC[alt]&&COMP_DESC[alt][comp];}
  if(!d)return{text:'',level:getCompLevel(score)};
  return{text:d[getCompLevel(score)],level:getCompLevel(score)};
}
function compDescLevelHTML(scores,perfil,compact){
  const entries=Object.entries(scores).filter(([k])=>k!=='Potencial'&&k!=='Potential');
  if(!entries.length)return '<div class="nodata">Sin datos</div>';
  const bgMap={alto:'#D1FAE5',medio:'#FFEDD5',bajo:'#FEE2E2'};
  const borderMap={alto:'#A7F3D0',medio:'#FED7AA',bajo:'#FECACA'};
  return entries.map(([k,v])=>{
    if(v===null||v===undefined)return '';
    const desc=getCompDesc(perfil,k,v);
    const col=scol(v),bg=bgMap[desc.level]||'#F9FAFB';
    const txt=desc.text;
    return '<div class="crow-desc" style="margin-bottom:6px;padding:7px 9px;border-radius:8px;background:'+bg+';border-left:3px solid '+borderMap[desc.level]+'">'+
      '<div style="font-size:.72rem;font-weight:700;color:var(--text2);margin-bottom:3px">'+esc(k)+'</div>'+
      '<div style="font-size:.67rem;color:#4B5563;line-height:1.45">'+esc(txt)+'</div>'+
    '</div>';
  }).join('');
}

/* ── COMP BARS (legacy, for PDF) ──────────────────────────────────────── */
function compBarsHTML(scores){
  const entries=Object.entries(scores).filter(([k])=>k!=='Potencial'&&k!=='Potential');
  if(!entries.length)return '<div class="nodata">Sin datos</div>';
  return entries.map(([k,v])=>{
    if(v===null||v===undefined)return '';
    const col=scol(v),sk=k.length>18?k.slice(0,16)+'…':k;
    return '<div class="crow"><div class="clabel" title="'+esc(k)+'">'+esc(sk)+'</div><div class="cbg"><div class="cfill" style="width:'+v+'%;background:'+col+'"></div></div><div class="cval" style="color:'+col+'">'+v+'</div></div>';
  }).join('');
}

    '</div>'+

      '<div class="jdir">'+esc(j.dir_corp||j.dir_area||j.gerencia||'')+'</div>'+

/* ── DIRECTION CARD (general view) ───────────────────────────────────── */
function groupByDirection(data){
  const groups={};
  data.forEach(j=>{
    const key=getDir(j);
    if(!key)return;
    if(!groups[key]) groups[key]={name:key,jefes:[]};
    groups[key].jefes.push(j);
  });
  return Object.values(groups).sort((a,b)=>a.name.localeCompare(b.name));
}

    '<div><div style="font-size:.82rem;font-weight:600;color:#0033A0">'+esc(j.name)+'</div><div style="font-size:.69rem;color:var(--text4)">'+esc(j.cargo||'')+'</div></div>'+
    '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:.68rem;color:var(--text3);font-weight:600">'+j.team.length+' a cargo</span><span style="color:#93C5FD;font-size:.75rem">→</span></div>'+

  return '<div class="jcard dir-card" data-dir-idx="'+idx+'">'+
    '<div class="jch" style="background:'+DIR_COLORS[idx%DIR_COLORS.length]+'">'+
      '<div class="jch-inner"><div style="flex:1">'+

function navigateToJefe(name,tabHint){

  if(tabHint&&tabHint!==curTab){
    targetTab=tabHint;

  }

      const cards=document.querySelectorAll('.jcard');
      if(cards[idx])cards[idx].scrollIntoView({behavior:'smooth',block:'center'});

      doFilter();
      setTimeout(()=>{const idx2=filtered.findIndex(j=>j.name===name);if(idx2>=0)openModal(idx2);},200);
    }
  },100);
}

/* ── PDF EXPORT ──────────────────────────────────────────────────────── */
async function exportPDF(idx){
  const j=filtered[idx];if(!j)return;
  const loading=document.getElementById('pdf-loading');
  loading.classList.add('show');
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,H=297,margin=14;let y=margin;
    const BLUE=[0,51,160],GREEN=[5,150,105],ORANGE=[234,88,12],GRAY=[107,114,128],DARK=[17,24,39],LIGHT=[243,244,246];
    function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];}
    function scRgb(v){if(v>=70)return GREEN;if(v>=50)return ORANGE;return[220,38,38];}
    function addPage(){doc.addPage();y=margin;}
    function checkY(needed){if(y+needed>H-margin)addPage();}
    function compDescBg(v){if(v>=70)return[209,250,229];if(v>=50)return[255,237,213];return[254,226,226];}
    function compDescBorder(v){if(v>=75)return[167,243,208];if(v>=55)return[254,215,170];return[254,202,202];}
    function compDescText(v){if(v>=75)return[6,95,70];if(v>=55)return[154,52,18];return[153,27,27];}
    function pdfRadar(doc,comps,x,y,w,color){
      const entries=Object.entries(comps).filter(([k,v])=>k!=='Potencial'&&k!=='Potential'&&v!=null);
      if(entries.length<3)return;
      const n=entries.length,cx=x+w/2,cy=y+w/2,r=w/2,fs=Math.max(6,Math.min(8,w/6));
      const angles=entries.map((_,i)=>Math.PI*2*i/n-Math.PI/2);
      const rgb=hexToRgb(color);
      [.2,.4,.6,.8,1].forEach(p=>{doc.setDrawColor(209,209,219);doc.setLineWidth(.13);const a=angles[0];let px=cx+r*p*Math.cos(a),py=cy+r*p*Math.sin(a);for(let i=1;i<=n;i++){const a2=angles[i%n],nx=cx+r*p*Math.cos(a2),ny=cy+r*p*Math.sin(a2);doc.line(px,py,nx,ny);px=nx;py=ny;}});
      doc.setDrawColor(209,209,219);doc.setLineWidth(.13);angles.forEach(a=>{doc.line(cx,cy,cx+r*Math.cos(a),cy+r*Math.sin(a));});
      const pts=entries.map(([k,v],i)=>[cx+r*(v/100)*Math.cos(angles[i]),cy+r*(v/100)*Math.sin(angles[i])]);
      doc.setFillColor(...rgb);doc.setDrawColor(...rgb);doc.setLineWidth(.53);
      for(let i=0;i<n;i++){const p1=pts[i],p2=pts[(i+1)%n];doc.triangle(cx,cy,p1[0],p1[1],p2[0],p2[1],'F');}
      doc.setDrawColor(...rgb);doc.setLineWidth(.53);
      for(let i=0;i<n;i++){const p1=pts[i],p2=pts[(i+1)%n];doc.line(p1[0],p1[1],p2[0],p2[1]);}
      pts.forEach(p=>{doc.setFillColor(...rgb);doc.setDrawColor(255,255,255);doc.setLineWidth(.26);doc.circle(p[0],p[1],1.3,'FD');});
      entries.forEach(([k,v],i)=>{
      const a=angles[i],px=cx+r*Math.cos(a),py=cy+r*Math.sin(a),off=4,lx=px+off*Math.cos(a),ly=py+off*Math.sin(a);
      doc.setTextColor(55,65,81);doc.setFont('helvetica','bold');doc.setFontSize(fs);
      const align=a>=-.1&&a<=.1?'center':(a>0&&a<Math.PI?'left':'right');
      if(k.length>15){const m=Math.floor(k.length/2);let s=k.lastIndexOf(' ',m);if(s<1)s=k.indexOf(' ',m);if(s>0){doc.text(k.slice(0,s),lx,ly-fs/4,{align});doc.text(k.slice(s+1),lx,ly+fs/4,{align});}else{doc.text(k,lx,ly,{align});}}else{doc.text(k,lx,ly,{align});}
      });
    }

    // Header
    doc.setFillColor(...BLUE);doc.rect(0,0,W,32,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.text('Valoración de Potencial',margin,13);
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text(j.name,margin,20);
    doc.setFontSize(8);
    doc.text((j.cargo||'')+'  ·  '+(j.dir_corp||j.dir_area||''),margin,26);
    y=38;

    const stats=teamStats(j.team);
    const statBoxes=[{l:'A cargo',v:j.team.length},...(stats.avgPot!=null?[{l:'Pot. prom.',v:stats.avgPot}]:[])];
    const bw=(W-margin*2)/statBoxes.length-3;
    statBoxes.forEach((s,i)=>{
      const bx=margin+i*(bw+3);
      doc.setFillColor(...LIGHT);doc.roundedRect(bx,y,bw,14,2,2,'F');
      doc.setTextColor(...BLUE);doc.setFont('helvetica','bold');doc.setFontSize(13);
      doc.text(String(s.v),bx+bw/2,y+8,{align:'center'});
      doc.setTextColor(...GRAY);doc.setFont('helvetica','normal');doc.setFontSize(6.5);
      doc.text(s.l.toUpperCase(),bx+bw/2,y+12,{align:'center'});
    });
    y+=20;

    // Team radar at top
    if(Object.keys(stats.avgs).length>=3){
      checkY(44);
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...DARK);
      doc.text('RADAR DEL EQUIPO',margin,y);y+=4;
      pdfRadar(doc,stats.avgs,(W-50)/2,y,50,RADAR_COL[teamDomVers(j.team)]||RADAR_COL.prof);
      y+=55;
    }

    // Dist bar
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...DARK);
    doc.text('DISTRIBUCIÓN DEL EQUIPO',margin,y);y+=5;
    const distItems=[{k:'ma',l:'Muy Alto',h:[2,132,199]},{k:'al',l:'Alto',h:[5,150,105]},{k:'mo',l:'Moderado',h:[217,119,6]},{k:'ba',l:'Bajo',h:[220,38,38]},{k:'mb',l:'Muy Bajo',h:[124,58,237]},{k:'sd',l:'Sin dato',h:[209,213,219]}].filter(d=>stats.dist[d.k]>0);
    const totalD=j.team.length,barW=W-margin*2,barH=5;let bxStart=margin;

/* ── COMPARE MODE ─────────────────────────────────────────────────────── */
let cmpMode=false, cmpSel=[];
function toggleCompare(){
  cmpMode=!cmpMode;
  document.getElementById('cmp-btn').classList.toggle('on',cmpMode);
  document.getElementById('cmp-bar').classList.toggle('show',cmpMode);
  if(!cmpMode){cmpSel=[];clearCompare();}
  renderGrid();
}
function clearCompare(){
  cmpSel=[];
  document.getElementById('cmp-count').textContent='0/2';
  document.getElementById('cmp-clear').classList.add('hide');
  document.querySelectorAll('.jcard.cmp-sel').forEach(c=>c.classList.remove('cmp-sel'));
}
function selectCompare(jefe){
  if(!cmpMode)return;
  const idx=cmpSel.indexOf(jefe);
  if(idx>=0){cmpSel.splice(idx,1);}
  else if(cmpSel.length<2){cmpSel.push(jefe);}
  if(cmpSel.length===2){
    document.getElementById('cmp-count').textContent='2/2';
    document.getElementById('cmp-clear').classList.remove('hide');
    renderComparison(cmpSel[0],cmpSel[1]);
  } else {
    document.getElementById('cmp-count').textContent=cmpSel.length+'/2';
    document.getElementById('cmp-clear').classList.toggle('hide',cmpSel.length===0);
  }
  // Update visual selection
  document.querySelectorAll('.jcard').forEach(c=>{
    const idx=parseInt(c.dataset.idx,10);
    const j=filtered[idx];
    c.classList.toggle('cmp-sel',j&&cmpSel.includes(j));
  });
}

      '<td style="color:'+(v1!=null?scol(v1):'#9CA3AF')+';font-weight:700">'+(v1!=null?v1:'—')+'</td>'+
      '<td style="color:'+(v2!=null?scol(v2):'#9CA3AF')+';font-weight:700">'+(v2!=null?v2:'—')+'</td>'+
      '<td class="comp-diff '+cls+'">'+(d!=null?(d>0?'+'+d:d):'—')+'</td>'+
    '</tr>';
  }).join('');

  const mhdr=document.getElementById('m-hdr');
  mhdr.style.background='linear-gradient(135deg,#1E3A5F 0%,#0033A0 100%)';
  document.getElementById('m-av').textContent='⇄';
  document.getElementById('m-av').style.background='#0033A0';
  document.getElementById('m-name').textContent='Comparación de equipos';
  document.getElementById('m-cargo').textContent=j1.name+' vs '+j2.name;
  document.getElementById('m-meta').textContent='';
  document.getElementById('m-stats').innerHTML='';
  document.getElementById('mbtn-pdf').style.display='none';
  document.getElementById('m-radar').innerHTML='';

  document.getElementById('m-body').innerHTML=
    '<div class="msec">'+
      '<div class="msec-title"><div class="msec-dot"></div>Radar de competencias — promedio del equipo</div>'+
      '<div class="comp-grid">'+hdr1+hdr2+'</div>'+
    '</div>'+
    '<div class="msec">'+
      '<div class="msec-title"><div class="msec-dot"></div>Comparación por competencia</div>'+
      '<table class="comp-table"><thead><tr>'+
        '<th>Competencia</th>'+
        '<th>'+esc(j1.name)+'</th>'+
        '<th>'+esc(j2.name)+'</th>'+
        '<th>Diferencia</th>'+
      '</tr></thead><tbody>'+rows+'</tbody></table>'+
    '</div>';

  document.getElementById('moverlay').classList.add('open');
  document.body.style.overflow='hidden';initRadarCharts();
}

/* ── HEATMAP ──────────────────────────────────────────────────────────── */
let hmActive=false;
function toggleHeatmap(){
  hmActive=!hmActive;
  document.getElementById('hm-btn').classList.toggle('on',hmActive);
  if(hmActive)cmpMode=false;
  renderGrid();
}
function renderHeatmap(){
  const members=[];
  filtered.forEach(j=>{
    j.team.forEach(m=>{
      if(m.scores&&Object.keys(m.scores).length)members.push({m,j});
    });
  });
  if(!members.length)return '<div class="nodata">Sin datos</div>';

  const compSet=new Set();
  members.forEach(({m})=>{
    Object.keys(m.scores).forEach(k=>{
      if(k!=='Potencial'&&k!=='Potential')compSet.add(k);
    });
  });
  const comps=[...compSet];

  let html='<div class="heatmap-wrap"><table class="heatmap-table"><thead><tr><th>Nombre</th>';
  comps.forEach(k=>{
    const ab=ABBR[k]||k.slice(0,4);
    html+='<th data-tip="'+esc(k)+'">'+esc(ab)+'</th>';
  });
  html+='</tr></thead><tbody>';

  members.forEach(({m,j})=>{
    html+='<tr><td class="heatmap-name" data-tip="Jefe: '+esc(j.name)+'">'+esc(m.name)+'</td>';
    comps.forEach(k=>{
      const v=m.scores[k];
      if(v!=null){
        html+='<td class="heatmap-cell" style="background:'+scol(v)+'" data-tip="'+esc(m.name)+' · '+esc(k)+': '+v+'">'+v+'</td>';
      } else {
        html+='<td style="background:#F9FAFB;color:#D1D5DB">—</td>';
      }
    });
    html+='</tr>';
  });

  html+='</tbody></table></div>';
  return html;
}

/* ── EVENT DELEGATION ────────────────────────────────────────────────── */
document.addEventListener('click',function(e){
  if(e.target.id==='mbtn-back'){if(prevModalIdx>=0){const idx=prevModalIdx;prevModalIdx=-1;openModal(idx);}else if(prevDirIdx>=0){const idx=prevDirIdx;prevDirIdx=-1;openDirectionModal(idx);}else{closeModal();}return;}
  if(e.target.id==='mbtn-close'||e.target.id==='moverlay'){closeModal();return;}
  if(e.target.id==='mbtn-pdf'||e.target.closest('#mbtn-pdf')){if(currentModalIdx>=0)exportPDF(currentModalIdx);return;}
  const pdfBtn=e.target.closest('.pdf-btn');
  if(pdfBtn){e.stopPropagation();exportPDF(parseInt(pdfBtn.dataset.pdfIdx,10));return;}
  const jLink=e.target.closest('.ecard-jefe-link');
  if(jLink){navigateToJefe(jLink.dataset.jefeName,jLink.dataset.jefeTab);return;}
  const mmb=e.target.closest('.mmb.is-jefe');
  if(mmb){e.stopPropagation();navigateToJefe(mmb.dataset.jefeName,'');return;}
  const dirJefe=e.target.closest('.dir-jefe');
  if(dirJefe){e.stopPropagation();const name=dirJefe.dataset.jefeName;document.getElementById('q').value=name;doFilter();setTimeout(()=>{const idx=filtered.findIndex(j=>j.name===name);if(idx>=0)openModal(idx);},100);return;}
  const dirModalJefe=e.target.closest('.dir-modal-jefe');
  if(dirModalJefe){
    const savedDirIdx=currentDirIdx;
    const jefeName=dirModalJefe.dataset.jefeName;
    closeModal();
    const jIdx=filtered.findIndex(j=>j.name===jefeName);
    if(jIdx>=0){
      if(savedDirIdx>=0)prevDirIdx=savedDirIdx;
      openModal(jIdx);
    }
    return;}
  const dirCard=e.target.closest('.dir-card');
  if(dirCard){openDirectionModal(parseInt(dirCard.dataset.dirIdx,10));return;}
  if(cmpMode){
    const cmpChk=e.target.closest('.cmp-chk');
    if(cmpChk){selectCompare(filtered[parseInt(cmpChk.dataset.cmpIdx,10)]);return;}
  }
  const card=e.target.closest('.jcard');
  if(card&&card.dataset.idx!==undefined){
    if(cmpMode){selectCompare(filtered[parseInt(card.dataset.idx,10)]);return;}
    openModal(parseInt(card.dataset.idx,10));return;
  }
  const empPdfBtn=e.target.closest('.emp-pdf-btn');
  if(empPdfBtn){
    e.stopPropagation();
    const mName=empPdfBtn.dataset.memberName;
    const jName=empPdfBtn.dataset.jefeName;
    if(!mName||!jName)return;
    let member=null,jefe=null;
    curData.forEach(j=>{
      if(j.name===jName)jefe=j;
      j.team.forEach(m=>{if(m.name===mName)member=m;});
    });
    if(member&&jefe)exportMemberPDF(member,jefe);
    return;
  }
  const empCard=e.target.closest('.ecard');
  if(empCard){
    e.stopPropagation();
    const mn=empCard.dataset.memberName;
    const jn=empCard.dataset.jefeName;
    if(!mn||!jn)return;
    let member=null,jefe=null;
    curData.forEach(j=>{
      if(j.name===jn)jefe=j;
      j.team.forEach(m=>{if(m.name===mn)member=m;});
    });
    if(member&&jefe)openPersonModal(member,jefe);
    return;
  }
  const ecardWrap=e.target.closest('.ecard-wrap');
  if(ecardWrap){
    const jn=ecardWrap.dataset.jefeName;
    const mn=ecardWrap.dataset.memberName;
    if(!mn||!jn)return;
    let member=null,jefe=null;
    curData.forEach(j=>{
      if(j.name===jn)jefe=j;
      j.team.forEach(m=>{if(m.name===mn)member=m;});
    });
    if(member&&jefe)openPersonModal(member,jefe);
    return;
  }
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ── FILTER / RENDER ─────────────────────────────────────────────────── */
let matchedMembers=[];
function getDir(j){return j.dir_corp||j.dir_area||function(){const dc={};(j.team||[]).forEach(m=>{const d=m.dir_corp;if(d)dc[d]=(dc[d]||0)+1;});const sorted=Object.entries(dc).sort((a,b)=>b[1]-a[1]);return sorted.length?sorted[0][0]:'';}();}
function doFilter(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const dir=document.getElementById('fdir').value;
  const vers=document.getElementById('fvers').value;
  const clasif=document.getElementById('fclasif').value;
  filtered=curData.filter(j=>{
    const mq=!q||j.name.toLowerCase().includes(q)||(j.cargo||'').toLowerCase().includes(q)||(j.dir_corp||'').toLowerCase().includes(q)||(j.dir_area||'').toLowerCase().includes(q)||j.team.some(m=>m.name.toLowerCase().includes(q));
    const md=!dir||getDir(j)===dir;
    const mv=!vers||j.team.some(m=>m.versatilidad===vers);
    const mc=!clasif||j.team.some(m=>m.clasificacion===clasif);
    return mq&&md&&mv&&mc;
  });
  // Collect matching team members in current tab only
  matchedMembers=[];
  if(q){
    const seen=new Set();
    curData.forEach(j=>{
      j.team.forEach(m=>{
        if(!m.name.toLowerCase().includes(q))return;
        if(seen.has(m.name))return;
        seen.add(m.name);
        matchedMembers.push({member:m,jefe:j});
      });
    });
  }
  renderGrid();
}

function populateDirFilter(){
  const dirs=new Set(curData.map(j=>getDir(j)).filter(Boolean));
  const sel=document.getElementById('fdir');
  sel.innerHTML='<option value="">Todas las Direcciones</option>';
  [...dirs].sort().forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
}

function renderGrid(){
  const grid=document.getElementById('maingrid');
  const empty=document.getElementById('empty');
  const q=document.getElementById('q').value.trim();

  if(hmActive){
    empty.style.display='none';
    grid.innerHTML=renderHeatmap();
    document.getElementById('rcount').textContent='Mapa de Calor — '+(q?'resultados filtrados':'todos los evaluados');
    return;
  }

  if(!filtered.length&&!matchedMembers.length){grid.innerHTML='';empty.style.display='block';document.getElementById('rcount').textContent='';return;}
  empty.style.display='none';

  const cmpCls=cmpMode?' cmp-active':'';
  if(q){
    const perfil=curTab==='est'?'V. Ejecutivo':'V. Gerente';
    const memberCards=matchedMembers.map(m=>{
      const jName=m.jefe.name;
      return '<div class="ecard-wrap" data-member-name="'+esc(m.member.name)+'" data-jefe-name="'+esc(jName)+'" style="cursor:pointer">'+empCardHTML(m.member,perfil,jName)+'</div>';
    }).join('');
    grid.innerHTML='<div class="emp-grid" style="grid-template-columns:repeat(auto-fill,minmax(275px,1fr));padding:0;grid-column:1/-1">'+memberCards+'</div>'+
      (filtered.length?'<div style="grid-column:1/-1;height:2px;background:#E5E7EB;margin:6px 0"></div>':'')+
      filtered.map((j,i)=>jefeCardHTML(j,i,cmpMode)).join('');
    const totalEval=filtered.reduce((a,j)=>a+j.team.length,0);
    document.getElementById('rcount').textContent=filtered.length+' jefe'+(filtered.length!==1?'s':'')+' · '+totalEval+' evaluados'+(matchedMembers.length?' · '+matchedMembers.length+' coincidencias directas':'');
  } else {
    const dirs=groupByDirection(filtered);
    if(!dirs.length){grid.innerHTML='';empty.style.display='block';document.getElementById('rcount').textContent='';return;}
    grid.innerHTML=dirs.map((d,i)=>directionCardHTML(d,i)).join('');
    const totalMembers=dirs.reduce((a,d)=>a+d.jefes.reduce((s,j)=>s+j.team.length,0),0);
    document.getElementById('rcount').textContent=dirs.length+' direcci'+(dirs.length!==1?'ones':'ón')+' · '+filtered.length+' jefe'+(filtered.length!==1?'s':'')+' · '+totalMembers+' evaluados';
  }
  grid.className='grid'+cmpCls;initRadarCharts();
}

function updateHeaderStats(){
  const all=curData.flatMap(j=>j.team);
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-jefes').textContent=curData.length;
  document.getElementById('s-alta').textContent=all.filter(m=>m.versatilidad==='Alta Versatilidad').length;
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curTab=tab;curData=DATA[tab];
  document.getElementById('q').value='';
  document.getElementById('fdir').value='';
  document.getElementById('fvers').value='';
  document.getElementById('fclasif').value='';
  filtered=[...curData];
  // Reset compare/heatmap states
  if(cmpMode){cmpMode=false;document.getElementById('cmp-btn').classList.remove('on');document.getElementById('cmp-bar').classList.remove('show');cmpSel=[];}
  if(hmActive){hmActive=false;document.getElementById('hm-btn').classList.remove('on');}
  populateDirFilter();updateHeaderStats();renderGrid();
}

(function(){
  document.getElementById('tc-est').textContent='('+DATA.est.length+')';
  document.getElementById('tc-op').textContent='('+DATA.op.length+')';
  filtered=[...curData];
  populateDirFilter();updateHeaderStats();renderGrid();
})();
</script>
